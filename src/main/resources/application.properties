quarkus.application.name=cxverso-qks-loadtransaction
# configure your datasource
quarkus.datasource.db-kind=mssql
quarkus.datasource.username=${DATABASE_LOCAL_USER}
quarkus.datasource.password=${DATABASE_LOCAL_PASSWORD}
quarkus.datasource.jdbc.url = jdbc:sqlserver://${HOST_LOCAL}:${MSSQL_TCP_PORT};databaseName=${DATABASE_LOCAL_NAME};encrypt=false;trustServerCertificate=true
quarkus.hibernate-orm.log.sql=true
# drop and create the database at startup (use `update` to only update the schema)
quarkus.hibernate-orm.schema-management.strategy = drop-and-create
#quarkus.hibernate-orm.schema-management.strategy = update